baseURL = 'https://owenqing.github.io/'
languageCode = 'en-CN'
title = 'owenqing'

hasCJKLanguage = true
enableInlineShortcodes = true
enableEmoji = true
# prevent build failures when using Hugo's Instagram shortcode due to deprecated Instagram API.
# See https://github.com/gohugoio/hugo/issues/7228#issuecomment-714490456
ignoreErrors = ["error-remote-getjson"]

disqusShortname = ""
# googleAnalytics = ""

[outputs]
home = ["HTML", "JSON", "RSS"]

[markup]
[markup.highlight]
noClasses = true
codeFences = true
guessSyntax = true
lineNos = false
lineNumbersInTable = false
style = "algol_nu"

[markup.goldmark.renderer]
unsafe = true

[menu]
[[menu.main]]
identifier = "home"
name = "Home"
url = "/"
weight = -100
[[menu.main]]
identifier = "archive"
name = "Archive"
url = "/archive/"
weight = 10
[[menu.main]]
identifier = "guide"
name = "Guide"
url = "/series/themes-guide/"
weight = 20
[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 50
[[menu.main]]
identifier = "github"
name = "Github"
# url = "https://github.com/roninro/hugo-theme-puppet/"
url = "https://github.com"
weight = 100

[params]
author = "owenqing"
description = ""
keywords = "blog,developer,personal"
# img_home = "img/home-bg.jpg"
img_home = "img/bg.jpg"
img_404 = "img/404-bg.jpg"

useFaviconGenerator = true

custom_js = []
custom_css = [
] # ["css/custom.css"]  Add your file to assets folder  [assets/css/custom.css]

[params.sidebar]
enable = true
gravatarEmail = ""
# Overwritten by your gravatar image if `gravatarEmail` is filled
# avatar = "img/home-bg.jpg"
bio = "不可避免的走向庸俗"
